{% load static %}
<section class="section" id="gallery">
  <div class="reveal">
    <div class="section-label">Gallery</div>
    <h2 class="section-title">Moments</h2>
    <p class="section-sub">A few glimpses from life's memorable chapters.</p>
  </div>

  <div class="gallery-grid">
    {% for img in gallery_images %}
      <div class="gallery-item g-item reveal{% if not forloop.first %} reveal-delay-{{ forloop.counter0 }}{% endif %}">
        {% if img.image %}
          <img src="{{ img.image.url }}" alt="{{ img.alt_text }}" {% if img.object_position %}style="object-position: {{ img.object_position }};"{% endif %} />
        {% else %}
          <div class="gallery-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            <span class="gp-label">{{ img.get_category_display }}</span>
          </div>
        {% endif %}
      </div>
    {% empty %}
      {# Show default static gallery when no gallery images in DB #}
      <div class="gallery-item g-item reveal">
        <img src="{% static 'images/IMG_8883.JPG' %}" alt="Nikhil Raj — Featured" style="object-position: center 20%;" />
      </div>
      <div class="gallery-item g-item reveal reveal-delay-1">
        <img src="{% static 'images/IMG_0132.jpg' %}" alt="Nikhil Raj — Candid / Travel" style="object-position: center center;" />
      </div>
      <div class="gallery-item g-item reveal reveal-delay-2">
        <img src="{% static 'images/IMG_1972.JPG' %}" alt="Nikhil Raj — Traditional / Ethnic" style="object-position: center 20%;" />
      </div>
      <div class="gallery-item g-item reveal reveal-delay-3">
        <img src="{% static 'images/IMG_2752.jpg' %}" alt="Nikhil Raj — Family" style="object-position: center center;" />
      </div>
      <div class="gallery-item g-item reveal reveal-delay-4">
        <img src="{% static 'images/IMG_8467.jpg' %}" alt="Nikhil Raj — Casual / Hobby" style="object-position: center center;" />
      </div>
    {% endfor %}
  </div>
</section>
