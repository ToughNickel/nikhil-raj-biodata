{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>{{ personal.full_name }} — Biodata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Tiro+Devanagari+Hindi:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/theme.css' %}" />
  <link rel="stylesheet" href="{% static 'css/base.css' %}" />
  <link rel="stylesheet" href="{% static 'css/components.css' %}" />
  <link rel="stylesheet" href="{% static 'css/sections.css' %}" />
  <link rel="stylesheet" href="{% static 'css/animations.css' %}" />
  <script>
    // Apply saved theme immediately to prevent flash
    (function() {
      var t = localStorage.getItem('nr-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  {% include 'biodata/partials/_nav.html' %}

  {% block content %}{% endblock %}

  {% include 'biodata/partials/_footer.html' %}

  {% block extra_data %}{% endblock %}

  <script src="{% static 'js/theme.js' %}"></script>
  <script src="{% static 'js/scroll-reveal.js' %}"></script>
  <script src="{% static 'js/nav.js' %}"></script>
  <script src="{% static 'js/greeting.js' %}"></script>
</body>
</html>
